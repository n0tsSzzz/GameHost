services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gamehost
      POSTGRES_USER: gamehost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamehost}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamehost -d gamehost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gamehost}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-gamehost-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  migrator:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      GAMEHOST_DATABASE_URL: postgresql+asyncpg://gamehost:${POSTGRES_PASSWORD:-gamehost}@postgres:5432/gamehost
      GAMEHOST_REDIS_URL: redis://redis:6379/0
      GAMEHOST_JWT_SECRET: ${GAMEHOST_JWT_SECRET:-change-me-in-real-env}
      GAMEHOST_NODE_AGENT_API_KEY: ${GAMEHOST_NODE_AGENT_API_KEY:-change-me-node-agent-key}
      GAMEHOST_DOMAIN: ${GAMEHOST_DOMAIN:-localhost}
      GAMEHOST_REFRESH_COOKIE_SECURE: ${GAMEHOST_REFRESH_COOKIE_SECURE:-false}
      GAMEHOST_ADMIN_EMAIL: ${GAMEHOST_ADMIN_EMAIL:-}
      GAMEHOST_NODE_AGENT_TIMEOUT_SECONDS: ${GAMEHOST_NODE_AGENT_TIMEOUT_SECONDS:-300}
      MINIO_ENDPOINT_URL: http://minio:9000
    command: [".venv/bin/alembic", "-c", "apps/api/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      GAMEHOST_DATABASE_URL: postgresql+asyncpg://gamehost:${POSTGRES_PASSWORD:-gamehost}@postgres:5432/gamehost
      GAMEHOST_REDIS_URL: redis://redis:6379/0
      GAMEHOST_JWT_SECRET: ${GAMEHOST_JWT_SECRET:-change-me-in-real-env}
      GAMEHOST_NODE_AGENT_API_KEY: ${GAMEHOST_NODE_AGENT_API_KEY:-change-me-node-agent-key}
      GAMEHOST_DOMAIN: ${GAMEHOST_DOMAIN:-localhost}
      GAMEHOST_REFRESH_COOKIE_SECURE: ${GAMEHOST_REFRESH_COOKIE_SECURE:-false}
      GAMEHOST_ADMIN_EMAIL: ${GAMEHOST_ADMIN_EMAIL:-}
      GAMEHOST_NODE_AGENT_TIMEOUT_SECONDS: ${GAMEHOST_NODE_AGENT_TIMEOUT_SECONDS:-300}
      MINIO_ENDPOINT_URL: http://minio:9000
    command: [".venv/bin/python", "apps/api/scripts/seed_templates.py"]
    depends_on:
      migrator:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      GAMEHOST_ENV: local
      GAMEHOST_API_HOST: 0.0.0.0
      GAMEHOST_API_PORT: 8000
      GAMEHOST_DATABASE_URL: postgresql+asyncpg://gamehost:${POSTGRES_PASSWORD:-gamehost}@postgres:5432/gamehost
      GAMEHOST_REDIS_URL: redis://redis:6379/0
      GAMEHOST_JWT_SECRET: ${GAMEHOST_JWT_SECRET:-change-me-in-real-env}
      GAMEHOST_FRONTEND_ORIGIN: http://localhost:3000
      GAMEHOST_NODE_AGENT_API_KEY: ${GAMEHOST_NODE_AGENT_API_KEY:-change-me-node-agent-key}
      GAMEHOST_DOMAIN: ${GAMEHOST_DOMAIN:-localhost}
      GAMEHOST_REFRESH_COOKIE_SECURE: ${GAMEHOST_REFRESH_COOKIE_SECURE:-false}
      GAMEHOST_ADMIN_EMAIL: ${GAMEHOST_ADMIN_EMAIL:-}
      GAMEHOST_NODE_AGENT_TIMEOUT_SECONDS: ${GAMEHOST_NODE_AGENT_TIMEOUT_SECONDS:-300}
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-gamehost-backups}
    ports:
      - "8000:8000"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      GAMEHOST_DATABASE_URL: postgresql+asyncpg://gamehost:${POSTGRES_PASSWORD:-gamehost}@postgres:5432/gamehost
      GAMEHOST_REDIS_URL: redis://redis:6379/0
      GAMEHOST_JWT_SECRET: ${GAMEHOST_JWT_SECRET:-change-me-in-real-env}
      GAMEHOST_NODE_AGENT_API_KEY: ${GAMEHOST_NODE_AGENT_API_KEY:-change-me-node-agent-key}
      GAMEHOST_DOMAIN: ${GAMEHOST_DOMAIN:-localhost}
      GAMEHOST_REFRESH_COOKIE_SECURE: ${GAMEHOST_REFRESH_COOKIE_SECURE:-false}
      GAMEHOST_ADMIN_EMAIL: ${GAMEHOST_ADMIN_EMAIL:-}
      GAMEHOST_NODE_AGENT_TIMEOUT_SECONDS: ${GAMEHOST_NODE_AGENT_TIMEOUT_SECONDS:-300}
      MINIO_ENDPOINT_URL: http://minio:9000
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      node-agent:
        condition: service_started

  node-agent:
    build:
      context: .
      dockerfile: apps/node_agent/Dockerfile
    environment:
      GAMEHOST_NODE_AGENT_API_KEY: ${GAMEHOST_NODE_AGENT_API_KEY:-change-me-node-agent-key}
      GAMEHOST_REDIS_URL: redis://redis:6379/0
    ports:
      - "8010:8010"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_INTERNAL_URL: http://api:8000
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/local-config.yaml:/etc/loki/local-config.yaml:ro

  promtail:
    image: grafana/promtail:latest
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - /var/log:/var/log:ro
      - ./deploy/promtail/config.yml:/etc/promtail/config.yml:ro

volumes:
  postgres-data:
  minio-data:
  grafana-data:
