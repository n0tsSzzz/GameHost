[project]
name = "gamehost-shared"
version = "0.1.0"
description = "Shared GameHost contracts"
requires-python = ">=3.12,<3.15"
dependencies = ["pydantic>=2.12,<3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gamehost_shared"]
