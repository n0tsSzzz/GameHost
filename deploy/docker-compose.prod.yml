services:
  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt

  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-gamehost/gamehost}/api:${GAMEHOST_VERSION:-latest}
    env_file: ../../.env
    labels:
      - traefik.enable=true
      - traefik.http.routers.gamehost-api.rule=Host(`${GAMEHOST_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.gamehost-api.entrypoints=websecure
      - traefik.http.routers.gamehost-api.tls.certresolver=letsencrypt
      - traefik.http.services.gamehost-api.loadbalancer.server.port=8000
    depends_on:
      - postgres
      - redis

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-gamehost/gamehost}/worker:${GAMEHOST_VERSION:-latest}
    env_file: ../../.env
    depends_on:
      - postgres
      - redis

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-gamehost/gamehost}/web:${GAMEHOST_VERSION:-latest}
    labels:
      - traefik.enable=true
      - traefik.http.routers.gamehost-web.rule=Host(`${GAMEHOST_DOMAIN}`)
      - traefik.http.routers.gamehost-web.entrypoints=websecure
      - traefik.http.routers.gamehost-web.tls.certresolver=letsencrypt
      - traefik.http.services.gamehost-web.loadbalancer.server.port=3000

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gamehost
      POSTGRES_USER: gamehost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data

volumes:
  traefik-letsencrypt:
  postgres-data:
  minio-data:
